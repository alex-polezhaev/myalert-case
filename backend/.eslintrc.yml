env:
  es2021: true
  node: true
extends: airbnb-base
parserOptions:
  ecmaVersion: latest
  sourceType: module
rules:
  no-console: 0
  import/extensions: 0
  import/no-extraneous-dependencies: 0
  no-underscore-dangle: 0
  import/prefer-default-export: 0
  consistent-return: 0
  camelcase: 0
  implicit-arrow-linebreak: 0
